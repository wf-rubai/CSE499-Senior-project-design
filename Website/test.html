<div id="val">Loading...</div>

<script>
setInterval(async () => {
  try {
    let res = await fetch("http://localhost:5001/data");
    let data = await res.json();

    console.log(data);

    if (data.lat && data.lon) {
      document.getElementById("val").innerText =
        `Lat: ${data.lat}, Lon: ${data.lon}`;
    } else {
      document.getElementById("val").innerText = "No Data";
    }

  } catch (e) {
    console.log("Error:", e);
  }
}, 1000);
</script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drone Route Map</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #08090d;
            --surface: #0e1018;
            --surface2: #141720;
            --border: rgba(100, 180, 255, 0.1);
            --border2: rgba(100, 180, 255, 0.18);
            --text: #d4e8ff;
            --muted: #5a7a9a;
            --accent: #00d4ff;
            --glow: rgba(0, 212, 255, 0.15);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* scanline overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        /* ── HEADER ── */
        header {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            background: var(--surface);
            flex-shrink: 0;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.4;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            filter: drop-shadow(0 0 6px var(--accent));
        }

        .logo-text h1 {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .logo-text p {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-chip {
            font-size: 11px;
            font-family: 'Orbitron', monospace;
            color: var(--muted);
            letter-spacing: 0.06em;
        }

        .status-chip span {
            color: #00ff9d;
            text-shadow: 0 0 8px rgba(0, 255, 157, 0.5);
        }

        /* ── MAIN ── */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        aside {
            background: var(--surface);
            border-right: 1px solid var(--border2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .section-label {
            padding: 12px 20px 8px;
            font-size: 10px;
            font-family: 'Orbitron', monospace;
            letter-spacing: 0.15em;
            color: var(--muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        /* Global controls */
        .global-controls {
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .ctrl-btn {
            flex: 1;
            padding: 7px 6px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--muted);
        }

        .ctrl-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--glow);
        }

        .ctrl-btn.active {
            background: rgba(0, 212, 255, 0.12);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Drone list */
        .drone-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .drone-list::-webkit-scrollbar {
            width: 3px;
        }

        .drone-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .drone-list::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 2px;
        }

        .drone-card {
            margin: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface2);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .drone-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--drone-color, var(--accent));
            opacity: 0.8;
        }

        .drone-card:hover {
            border-color: rgba(100, 180, 255, 0.3);
            background: #191e2a;
        }

        .drone-card.path-visible {
            border-color: var(--drone-color, var(--accent));
            background: #191e2a;
            box-shadow: 0 0 12px -4px var(--drone-color, var(--accent));
        }

        .drone-card-inner {
            padding: 10px 12px 10px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .drone-icon-wrap {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.3);
        }

        .drone-icon-wrap svg {
            width: 18px;
            height: 18px;
        }

        .drone-info {
            flex: 1;
            min-width: 0;
        }

        .drone-name {
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .drone-meta {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }

        .drone-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .icon-btn {
            width: 26px;
            height: 26px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            color: var(--muted);
        }

        .icon-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* colour swatch button */
        .swatch-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .swatch-btn:hover {
            transform: scale(1.2);
            box-shadow: 0 0 8px 2px currentColor;
        }

        /* ── MAP ── */
        #map {
            width: 100%;
            height: 100%;
        }

        /* Leaflet overrides */
        .leaflet-container {
            background: #08090d !important;
        }

        .leaflet-tile {
            filter: brightness(0.45) saturate(0.3) hue-rotate(180deg);
        }

        .leaflet-control-zoom a {
            background: #0e1018 !important;
            color: #d4e8ff !important;
            border-color: rgba(100, 180, 255, 0.2) !important;
            font-family: 'Orbitron', monospace !important;
        }

        .leaflet-control-zoom a:hover {
            background: #141720 !important;
        }

        .leaflet-control-attribution {
            background: rgba(8, 9, 13, 0.7) !important;
            color: var(--muted) !important;
            font-size: 9px !important;
        }

        .leaflet-control-attribution a {
            color: var(--muted) !important;
        }

        /* Drone SVG marker */
        .drone-marker-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drone-marker-wrap .pulse-ring {
            position: absolute;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid currentColor;
            animation: pulse-ring 2s ease-out infinite;
            opacity: 0;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.5);
                opacity: 0.8;
            }

            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        /* ── COLOR PICKER MODAL ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 10px;
            padding: 24px;
            width: 300px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px -10px var(--accent);
            position: relative;
        }

        .modal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .modal-title {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .modal-sub {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 20px;
        }

        .color-preview {
            width: 100%;
            height: 48px;
            border-radius: 6px;
            margin-bottom: 14px;
            border: 1px solid var(--border2);
            transition: background 0.15s;
        }

        .modal-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .modal-input-row label {
            font-size: 12px;
            color: var(--muted);
            width: 48px;
            flex-shrink: 0;
        }

        .modal-input-row input[type=color] {
            width: 42px;
            height: 32px;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            border-radius: 4px;
            overflow: hidden;
        }

        .modal-input-row input[type=text] {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            padding: 6px 10px;
            letter-spacing: 0.08em;
            outline: none;
            transition: border-color 0.15s;
        }

        .modal-input-row input[type=text]:focus {
            border-color: var(--accent);
        }

        .presets {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 18px;
        }

        .preset-chip {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.15s, border-color 0.15s;
        }

        .preset-chip:hover {
            transform: scale(1.2);
        }

        .preset-chip.selected {
            border-color: rgba(255, 255, 255, 0.7);
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
        }

        .modal-btn {
            flex: 1;
            padding: 9px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid var(--border2);
        }

        .modal-btn.confirm {
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent);
            border-color: var(--accent);
        }

        .modal-btn.confirm:hover {
            background: rgba(0, 212, 255, 0.25);
        }

        .modal-btn.cancel {
            background: transparent;
            color: var(--muted);
        }

        .modal-btn.cancel:hover {
            color: var(--text);
        }

        /* tooltip */
        .leaflet-tooltip {
            background: var(--surface) !important;
            border: 1px solid var(--border2) !important;
            color: var(--text) !important;
            font-family: 'Rajdhani', sans-serif !important;
            font-size: 12px !important;
            border-radius: 4px !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5) !important;
            white-space: nowrap;
        }

        .leaflet-tooltip-top::before {
            border-top-color: var(--border2) !important;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <div class="logo-icon">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                    <circle cx="15" cy="15" r="14" stroke="var(--accent)" stroke-width="1" opacity="0.4" />
                    <path d="M15 4 L26 10 L26 20 L15 26 L4 20 L4 10 Z" stroke="var(--accent)" stroke-width="1"
                        fill="none" opacity="0.5" />
                    <circle cx="15" cy="15" r="3" fill="var(--accent)" />
                    <line x1="15" y1="8" x2="15" y2="12" stroke="var(--accent)" stroke-width="1.5" />
                    <line x1="15" y1="18" x2="15" y2="22" stroke="var(--accent)" stroke-width="1.5" />
                    <line x1="8" y1="15" x2="12" y2="15" stroke="var(--accent)" stroke-width="1.5" />
                    <line x1="18" y1="15" x2="22" y2="15" stroke="var(--accent)" stroke-width="1.5" />
                </svg>
            </div>
            <div class="logo-text">
                <h1>DRONETRACK</h1>
                <p>Multi-UAV Route Mapping System</p>
            </div>
        </div>
        <div class="header-status">
            <div class="status-chip">DRONES ACTIVE: <span id="droneCount">4</span></div>
            <div class="status-chip">STATUS: <span>LIVE</span></div>
        </div>
    </header>

    <main>
        <!-- SIDEBAR -->
        <aside>
            <div class="section-label">Fleet Control</div>

            <div class="global-controls">
                <button class="ctrl-btn" id="btnShowAll" onclick="showAllPaths()">Show All</button>
                <button class="ctrl-btn" id="btnHideAll" onclick="hideAllPaths()">Hide All</button>
            </div>

            <div class="section-label">Active Drones</div>
            <div class="drone-list" id="droneList"></div>
        </aside>

        <!-- MAP -->
        <div id="map"></div>
    </main>

    <!-- COLOR PICKER MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-title">EDIT DRONE COLOR</div>
            <div class="modal-sub" id="modalDroneName">Drone Alpha</div>
            <div class="color-preview" id="colorPreview"></div>
            <div class="modal-input-row">
                <label>Picker</label>
                <input type="color" id="colorPicker" oninput="onColorInput(this.value)">
                <input type="text" id="colorHex" maxlength="7" placeholder="#00d4ff" oninput="onHexInput(this.value)">
            </div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:0.06em;">PRESETS</div>
            <div class="presets" id="presets"></div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn confirm" onclick="applyColor()">Apply</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        /* ══════════════════════════════════════
           DRONE DATA
        ══════════════════════════════════════ */
        const drones = [
            {
                id: 'alpha',
                name: 'DRONE ALPHA',
                color: '#00d4ff',
                waypoints: [
                    [48.8566, 2.3522], // Paris
                    [49.2500, 4.0333], // Reims
                    [49.4431, 1.0993], // Rouen
                    [50.6292, 3.0573], // Lille
                    [51.0500, 2.5500], // Dunkirk
                ],
            },
            {
                id: 'beta',
                name: 'DRONE BETA',
                color: '#ff6b35',
                waypoints: [
                    [52.5200, 13.4050], // Berlin
                    [53.5753, 10.0153], // Hamburg
                    [53.0793, 8.8017],  // Bremen
                    [51.5136, 7.4653],  // Dortmund
                    [50.9333, 6.9500],  // Cologne
                ],
            },
            {
                id: 'gamma',
                name: 'DRONE GAMMA',
                color: '#7fff00',
                waypoints: [
                    [41.9028, 12.4964], // Rome
                    [43.7696, 11.2558], // Florence
                    [45.4642, 9.1900],  // Milan
                    [44.4949, 11.3426], // Bologna
                    [45.6495, 13.7768], // Trieste
                ],
            },
            {
                id: 'delta',
                name: 'DRONE DELTA',
                color: '#e040fb',
                waypoints: [
                    [40.4168, -3.7038], // Madrid
                    [39.4699, -0.3763], // Valencia
                    [41.3851, 2.1734], // Barcelona
                    [43.2965, 5.3698], // Marseille
                    [43.7102, 7.2620], // Nice
                ],
            },
        ];

        /* ══════════════════════════════════════
           MAP INIT
        ══════════════════════════════════════ */
        const map = L.map('map', { zoomControl: true, attributionControl: true });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 18,
        }).addTo(map);

        // Fit to all points
        const allPts = drones.flatMap(d => d.waypoints);
        map.fitBounds(allPts, { padding: [40, 40] });

        /* ══════════════════════════════════════
           DRONE SVG ICON (for latest position)
        ══════════════════════════════════════ */
        function droneIcon(color) {
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="18" fill="rgba(0,0,0,0.5)" stroke="${color}" stroke-width="1.5" opacity="0.6"/>
    <!-- arms -->
    <line x1="20" y1="20" x2="8"  y2="8"  stroke="${color}" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="32" y2="8"  stroke="${color}" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="8"  y2="32" stroke="${color}" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="32" y2="32" stroke="${color}" stroke-width="2" stroke-linecap="round"/>
    <!-- rotors -->
    <circle cx="8"  cy="8"  r="5" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.8"/>
    <circle cx="32" cy="8"  r="5" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.8"/>
    <circle cx="8"  cy="32" r="5" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.8"/>
    <circle cx="32" cy="32" r="5" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.8"/>
    <!-- body -->
    <circle cx="20" cy="20" r="4" fill="${color}"/>
    <circle cx="20" cy="20" r="2" fill="rgba(0,0,0,0.6)"/>
    <!-- glow ring -->
    <circle cx="20" cy="20" r="7" fill="none" stroke="${color}" stroke-width="0.8" opacity="0.4"/>
  </svg>`;

            return L.divIcon({
                html: `<div style="filter:drop-shadow(0 0 6px ${color})">${svg}</div>`,
                className: '',
                iconSize: [40, 40],
                iconAnchor: [20, 20],
                tooltipAnchor: [0, -22],
            });
        }

        /* ══════════════════════════════════════
           BUILD DRONE LAYERS
        ══════════════════════════════════════ */
        const droneState = {}; // id -> { polyline, marker, pathVisible }

        drones.forEach(drone => {
            // Polyline (hidden by default)
            const poly = L.polyline(drone.waypoints, {
                color: drone.color,
                weight: 2.5,
                opacity: 0.85,
                dashArray: '8 4',
            });

            // Latest-position marker (always visible)
            const lastPt = drone.waypoints[drone.waypoints.length - 1];
            const marker = L.marker(lastPt, { icon: droneIcon(drone.color) })
                .addTo(map)
                .bindTooltip(`<b>${drone.name}</b><br>${drone.waypoints.length} waypoints`, {
                    direction: 'top',
                    permanent: false,
                });

            marker.on('click', () => toggleDronePath(drone.id));

            droneState[drone.id] = { poly, marker, pathVisible: false };
        });

        /* ══════════════════════════════════════
           BUILD SIDEBAR
        ══════════════════════════════════════ */
        const listEl = document.getElementById('droneList');

        drones.forEach(drone => {
            const card = document.createElement('div');
            card.className = 'drone-card';
            card.id = `card-${drone.id}`;
            card.style.setProperty('--drone-color', drone.color);
            card.innerHTML = `
    <div class="drone-card-inner">
      <div class="drone-icon-wrap" id="iconwrap-${drone.id}" style="border-color:${drone.color};color:${drone.color}">
        ${miniDroneSvg(drone.color)}
      </div>
      <div class="drone-info">
        <div class="drone-name" style="color:${drone.color}">${drone.name}</div>
        <div class="drone-meta">${drone.waypoints.length} waypoints · path hidden</div>
      </div>
      <div class="drone-actions">
        <button class="icon-btn" title="Edit color" onclick="openModal('${drone.id}')">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="3.5" stroke="currentColor" stroke-width="1.3"/>
            <circle cx="7" cy="7" r="1" fill="currentColor"/>
            <line x1="7" y1="0" x2="7" y2="3" stroke="currentColor" stroke-width="1.3"/>
            <line x1="7" y1="11" x2="7" y2="14" stroke="currentColor" stroke-width="1.3"/>
            <line x1="0" y1="7" x2="3" y2="7" stroke="currentColor" stroke-width="1.3"/>
            <line x1="11" y1="7" x2="14" y2="7" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </button>
      </div>
      <div class="swatch-btn" id="swatch-${drone.id}" style="background:${drone.color}" onclick="openModal('${drone.id}')"></div>
    </div>
  `;
            card.addEventListener('click', (e) => {
                if (e.target.closest('.icon-btn') || e.target.closest('.swatch-btn')) return;
                toggleDronePath(drone.id);
            });
            listEl.appendChild(card);
        });

        function miniDroneSvg(color) {
            return `<svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <line x1="9" y1="9" x2="3" y2="3" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9" y1="9" x2="15" y2="3" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9" y1="9" x2="3" y2="15" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9" y1="9" x2="15" y2="15" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="3"  cy="3"  r="2.5" fill="none" stroke="${color}" stroke-width="1"/>
    <circle cx="15" cy="3"  r="2.5" fill="none" stroke="${color}" stroke-width="1"/>
    <circle cx="3"  cy="15" r="2.5" fill="none" stroke="${color}" stroke-width="1"/>
    <circle cx="15" cy="15" r="2.5" fill="none" stroke="${color}" stroke-width="1"/>
    <circle cx="9"  cy="9"  r="2.5" fill="${color}"/>
  </svg>`;
        }

        /* ══════════════════════════════════════
           TOGGLE PATH
        ══════════════════════════════════════ */
        function toggleDronePath(id) {
            const state = droneState[id];
            const drone = drones.find(d => d.id === id);
            if (state.pathVisible) {
                map.removeLayer(state.poly);
                state.pathVisible = false;
            } else {
                state.poly.addTo(map);
                state.pathVisible = true;
                // Fly to this drone
                map.flyToBounds(drone.waypoints, { padding: [60, 60], duration: 1.2 });
            }
            updateCardUI(id);
        }

        function showAllPaths() {
            drones.forEach(d => {
                const state = droneState[d.id];
                if (!state.pathVisible) { state.poly.addTo(map); state.pathVisible = true; }
                updateCardUI(d.id);
            });
            map.fitBounds(allPts, { padding: [40, 40], animate: true });
        }

        function hideAllPaths() {
            drones.forEach(d => {
                const state = droneState[d.id];
                if (state.pathVisible) { map.removeLayer(state.poly); state.pathVisible = false; }
                updateCardUI(d.id);
            });
        }

        function updateCardUI(id) {
            const state = droneState[id];
            const drone = drones.find(d => d.id === id);
            const card = document.getElementById(`card-${id}`);
            const meta = card.querySelector('.drone-meta');
            if (state.pathVisible) {
                card.classList.add('path-visible');
                meta.textContent = `${drone.waypoints.length} waypoints · path visible`;
            } else {
                card.classList.remove('path-visible');
                meta.textContent = `${drone.waypoints.length} waypoints · path hidden`;
            }
        }

        /* ══════════════════════════════════════
           COLOR PICKER MODAL
        ══════════════════════════════════════ */
        const PRESETS = ['#00d4ff', '#ff6b35', '#7fff00', '#e040fb', '#ffdd00', '#ff1744', '#00e5ff', '#64ffda', '#ff80ab', '#ffffff', '#ff9800', '#76ff03'];

        let activeModalId = null;
        let pendingColor = null;

        const presetContainer = document.getElementById('presets');
        PRESETS.forEach(c => {
            const chip = document.createElement('div');
            chip.className = 'preset-chip';
            chip.style.background = c;
            chip.dataset.color = c;
            chip.title = c;
            chip.addEventListener('click', () => {
                document.querySelectorAll('.preset-chip').forEach(x => x.classList.remove('selected'));
                chip.classList.add('selected');
                setModalColor(c);
            });
            presetContainer.appendChild(chip);
        });

        function openModal(id) {
            activeModalId = id;
            const drone = drones.find(d => d.id === id);
            pendingColor = drone.color;
            document.getElementById('modalDroneName').textContent = drone.name;
            setModalColor(drone.color);
            document.getElementById('modalOverlay').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
            activeModalId = null;
        }

        function setModalColor(hex) {
            pendingColor = hex;
            document.getElementById('colorPreview').style.background = hex;
            document.getElementById('colorPicker').value = hex;
            document.getElementById('colorHex').value = hex;
            document.querySelectorAll('.preset-chip').forEach(c => {
                c.classList.toggle('selected', c.dataset.color === hex);
            });
        }

        function onColorInput(val) { setModalColor(val); }

        function onHexInput(val) {
            if (/^#[0-9a-fA-F]{6}$/.test(val)) setModalColor(val);
        }

        function applyColor() {
            if (!activeModalId || !pendingColor) return;
            const drone = drones.find(d => d.id === activeModalId);
            drone.color = pendingColor;

            const state = droneState[activeModalId];

            // Update polyline
            state.poly.setStyle({ color: pendingColor });

            // Update marker icon
            state.marker.setIcon(droneIcon(pendingColor));

            // Update sidebar card
            const card = document.getElementById(`card-${activeModalId}`);
            card.style.setProperty('--drone-color', pendingColor);
            const nameEl = card.querySelector('.drone-name');
            nameEl.style.color = pendingColor;
            card.querySelector(`#swatch-${activeModalId}`).style.background = pendingColor;
            card.querySelector(`#iconwrap-${activeModalId}`).style.borderColor = pendingColor;
            card.querySelector(`#iconwrap-${activeModalId}`).style.color = pendingColor;
            card.querySelector(`#iconwrap-${activeModalId}`).innerHTML = miniDroneSvg(pendingColor);

            closeModal();
        }

        // Close modal on overlay click
        document.getElementById('modalOverlay').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        // ESC key
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        document.getElementById('droneCount').textContent = drones.length;
    </script>
</body>

</html>
